# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: en-US
early_access: false
tone_instructions: "Be terse. Focus on bugs and security. Skip stylistic nits."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!Assets/PNG/**"
    - "!Assets/SVG/**"
    - "!**/*.png"
    - "!**/*.svg"
    - "!header.png"
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - master
      - fork-flagkit
  tools:
    languagetool:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  auto_reply: true
