name: Auto-merge approved PRs (after 7 days)

# Eligibility criteria:
#   - PR is not a draft
#   - PR is at least 7 days old (created_at)
#   - Has at least one APPROVED review from a code owner, repo collaborator,
#     or coderabbitai[bot]
#   - All required check runs on the head SHA succeeded (no failure / cancelled)
#   - PR is mergeable (no conflicts)
#
# The owner can always merge manually via the GitHub UI - this workflow does
# not block manual merges. It only enables auto-merge for PRs that meet the
# criteria above.

on:
  schedule:
    - cron: '23 */6 * * *'   # every 6 hours at xx:23
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate (blank = scan all)"
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  evaluate:
    name: Evaluate and merge eligible PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;
            const APPROVER_BOTS = new Set(['coderabbitai[bot]', 'coderabbitai']);

            const explicitPr = '${{ github.event.inputs.pr_number }}';
            const reviewPr = context.payload?.pull_request?.number;

            // Decide which PR(s) to evaluate
            let prs;
            if (explicitPr) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(explicitPr),
              });
              prs = [data];
            } else if (reviewPr) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: reviewPr,
              });
              prs = [data];
            } else {
              const { data } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });
              prs = data;
            }

            const collaboratorCache = new Map();
            async function isCollaborator(login) {
              if (collaboratorCache.has(login)) return collaboratorCache.get(login);
              try {
                await github.rest.repos.checkCollaborator({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: login,
                });
                collaboratorCache.set(login, true);
                return true;
              } catch (e) {
                collaboratorCache.set(login, false);
                return false;
              }
            }

            // Load CODEOWNERS to identify owner approvers
            let ownersList = [];
            try {
              const { data: file } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/CODEOWNERS',
              });
              const text = Buffer.from(file.content, 'base64').toString('utf8');
              ownersList = [...new Set(
                text.split('\n')
                  .filter(l => l.trim() && !l.trim().startsWith('#'))
                  .flatMap(l => l.match(/@[A-Za-z0-9-]+/g) || [])
                  .map(o => o.slice(1))
              )];
            } catch (e) {
              core.info('No CODEOWNERS file found; falling back to collaborator/bot checks only');
            }

            for (const pr of prs) {
              core.startGroup(`PR #${pr.number} - ${pr.title}`);
              try {
                if (pr.draft) { core.info('Skip: draft'); continue; }

                const age = Date.now() - new Date(pr.created_at).getTime();
                if (age < ONE_WEEK_MS) {
                  const daysLeft = ((ONE_WEEK_MS - age) / (24 * 3600 * 1000)).toFixed(1);
                  core.info(`Skip: too young (${daysLeft} day(s) left until eligible)`);
                  continue;
                }

                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });

                // Latest review state per reviewer wins
                const latest = new Map();
                for (const r of reviews) {
                  const login = r.user?.login;
                  if (!login) continue;
                  latest.set(login, r);
                }
                const approvers = [...latest.values()].filter(r => r.state === 'APPROVED');
                const requestChanges = [...latest.values()].filter(r => r.state === 'CHANGES_REQUESTED');
                if (requestChanges.length > 0) {
                  core.info(`Skip: open CHANGES_REQUESTED from ${requestChanges.map(r => r.user.login).join(', ')}`);
                  continue;
                }

                // Dependabot's own PRs are treated as pre-approved by the bot
                // itself - we trust the @dependabot author for its dependency
                // updates. The 7-day age requirement still applies as a soak
                // window, and CHANGES_REQUESTED above can still block.
                const isDependabot = pr.user?.login === 'dependabot[bot]';
                let eligibleApprover = null;
                if (isDependabot) {
                  eligibleApprover = 'dependabot[bot] (author-trusted)';
                } else {
                  if (approvers.length === 0) {
                    core.info('Skip: no APPROVED reviews');
                    continue;
                  }
                  for (const r of approvers) {
                    const login = r.user.login;
                    if (APPROVER_BOTS.has(login)) { eligibleApprover = login; break; }
                    if (ownersList.includes(login)) { eligibleApprover = login; break; }
                    if (await isCollaborator(login)) { eligibleApprover = login; break; }
                  }
                  if (!eligibleApprover) {
                    core.info(`Skip: approvals (${approvers.map(r => r.user.login).join(', ')}) are not code-owner, collaborator, or CodeRabbit`);
                    continue;
                  }
                }

                const { data: checks } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: pr.head.sha,
                });
                const failed = checks.check_runs.filter(c =>
                  c.status === 'completed' && ['failure', 'cancelled', 'timed_out'].includes(c.conclusion)
                );
                if (failed.length > 0) {
                  core.info(`Skip: failing checks (${failed.map(c => c.name).join(', ')})`);
                  continue;
                }
                const pending = checks.check_runs.filter(c => c.status !== 'completed');
                if (pending.length > 0) {
                  core.info(`Skip: pending checks (${pending.map(c => c.name).join(', ')})`);
                  continue;
                }

                if (pr.mergeable === false) {
                  core.info('Skip: PR has merge conflicts');
                  continue;
                }

                core.info(`MERGE: PR #${pr.number} approved by ${eligibleApprover}, ${(age / 86400000).toFixed(1)} days old, checks green`);
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                });
                core.info(`Merged PR #${pr.number}`);
              } catch (err) {
                core.warning(`PR #${pr.number}: ${err.message}`);
              } finally {
                core.endGroup();
              }
            }
