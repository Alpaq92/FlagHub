name: CodeQL

on:
  push:
    branches: [main, master, fork-flagkit]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', 'header-light.png', 'header-dark.png', 'SECURITY.md']
  pull_request:
    branches: [main, master, fork-flagkit]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', 'header-light.png', 'header-dark.png', 'SECURITY.md']
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [swift]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # Skip the default autobuild - it picks the FlagHubDemo-iOS xcodebuild
      # target which has app-bundle / signing assumptions that don't apply in
      # headless CI. The SPM target is the actual library and is what consumers
      # will compile against; analyse that instead.
      - name: Build SPM target for CodeQL
        run: swift build

      - name: Run analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
