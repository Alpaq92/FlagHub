name: Build & Release

# "Every merge to main triggers a rebuild and deploy" -
#   - On every push to main / master / fork-flagkit: build, test, optimise,
#     and upload the framework + asset archive as a workflow artefact
#   - On semver tags (v*.*.*): also publish a GitHub Release with the
#     archive attached

on:
  push:
    branches: [main, master, fork-flagkit]
    tags: ['v*.*.*']
    # Skip rebuild for docs-only changes. Tags still publish releases
    # regardless of which files changed in the tagged commit.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'header.png'
      - 'docs/AUTOMATION.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build framework
    runs-on: macos-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      archive: ${{ steps.archive.outputs.path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build SPM
        run: swift build -c release

      - name: Test SPM
        run: swift test

      # SPM packages don't natively produce .framework bundles via
      # `xcodebuild archive`. The community tool swift-create-xcframework
      # generates a wrapper Xcode project, builds each platform slice as a
      # framework, and stitches them into an xcframework. Pinned to a
      # specific commit on the maintained segment-integrations fork for
      # reproducibility (upstream unsignedapps/swift-create-xcframework is
      # archived as of 2024).
      - name: Install swift-create-xcframework
        run: |
          set -e
          git clone https://github.com/segment-integrations/swift-create-xcframework.git /tmp/scx
          git -C /tmp/scx checkout 33079d3
          swift build --package-path /tmp/scx -c release
          sudo cp /tmp/scx/.build/release/swift-create-xcframework /usr/local/bin/

      - name: Build xcframework
        run: |
          set -e
          mkdir -p .build/xcframework
          swift-create-xcframework \
            --platform ios \
            --platform macos \
            --platform tvos \
            --stack-evolution \
            --output .build/xcframework \
            FlagHub
        continue-on-error: true

      - name: Archive
        id: archive
        run: |
          set -e
          mkdir -p dist
          tar -czf "dist/FlagHub-${{ steps.meta.outputs.version }}.tar.gz" \
            Sources/FlagHub \
            Assets \
            FlagHub.podspec \
            Package.swift \
            LICENSE \
            README.md \
            CHANGELOG.md \
            docs/OVERVIEW.md \
            header.png
          if [[ -d .build/xcframework/FlagHub.xcframework ]]; then
            tar -czf "dist/FlagHub-${{ steps.meta.outputs.version }}-xcframework.tar.gz" \
              -C .build/xcframework FlagHub.xcframework
          fi
          echo "path=dist" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: FlagHub-${{ steps.meta.outputs.version }}
          path: dist/

  release:
    name: GitHub Release (tagged only)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: FlagHub-${{ needs.build.outputs.version }}
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
