name: CI

on:
  push:
    branches: [main, master, fork-flagkit]
    # Skip CI for changes that can't affect the build output: docs, the
    # changelog, the license, the header banner image, anything under docs/.
    # Conventional-commits 'docs:' / 'chore(changelog):' style commits will
    # match this filter and skip the entire CI workflow.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'header-light.png'
      - 'header-dark.png'
      - 'docs/AUTOMATION.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main, master, fork-flagkit]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'header-light.png'
      - 'header-dark.png'
      - 'docs/AUTOMATION.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm-build:
    name: Swift Package build & test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
        continue-on-error: true
      - name: Show Swift version
        run: swift --version
      - name: Build (host platform)
        run: swift build
      - name: Test (host platform)
        run: swift test

  spm-build-ios:
    name: SPM build for iOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme FlagHub \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/xcode \
            | xcpretty
        continue-on-error: false

  podspec-lint:
    name: CocoaPods spec lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint podspec
        run: pod lib lint FlagHub.podspec --allow-warnings
