name: Update CHANGELOG

# When a PR is merged into main, prepend a one-line entry under the
# [Unreleased] heading of CHANGELOG.md and push the change back. The
# commit message ends with [skip ci] so CI / release / auto-merge
# don't re-fire on the resulting bot commit.

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: changelog-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  prepend:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const PATH = 'CHANGELOG.md';

            if (!fs.existsSync(PATH)) {
              core.setFailed(`${PATH} does not exist`);
              return;
            }

            const pr = context.payload.pull_request;
            const number = pr.number;
            const url = pr.html_url;
            const title = pr.title.replace(/\s+/g, ' ').trim();
            const author = pr.user.login;
            const isBot = author.endsWith('[bot]');
            const authorLink = isBot ? `\`${author}\`` : `@${author}`;

            // Extract first non-blank line of the PR body as a sub-summary,
            // capped at 200 chars so a giant body doesn't blow up the changelog.
            const body = (pr.body || '')
              .replace(/<!--[\s\S]*?-->/g, '')           // strip HTML comments
              .replace(/\r/g, '')
              .split('\n')
              .map(l => l.trim())
              .find(l => l.length > 0 && !l.startsWith('#'));
            const summary = body ? body.substring(0, 200).replace(/[*_`]/g, '') : '';

            const entry =
              `- [#${number}](${url}) ${title} — ${authorLink}` +
              (summary ? `\n  > ${summary}` : '');

            let changelog = fs.readFileSync(PATH, 'utf8');

            // Idempotency: skip if this PR number is already linked anywhere
            // in the Unreleased section.
            const unreleasedRe = /## \[Unreleased\][^\n]*\n[\s\S]*?(?=\n## \[)/;
            const unreleasedMatch = changelog.match(unreleasedRe);
            if (!unreleasedMatch) {
              core.setFailed('CHANGELOG.md is missing a `## [Unreleased]` section');
              return;
            }
            if (unreleasedMatch[0].includes(`[#${number}]`)) {
              core.info(`PR #${number} already present in [Unreleased] - no change`);
              return;
            }

            // Insert immediately after the auto-generated-comment marker if
            // present, otherwise right after the Unreleased heading line.
            const markerRe = /(## \[Unreleased\][^\n]*\n)(\n*<!--[^>]*workflow[^>]*-->\n)?/;
            changelog = changelog.replace(markerRe, (_full, h1, h2) => {
              return h1 + (h2 || '') + '\n' + entry + '\n';
            });

            fs.writeFileSync(PATH, changelog);
            core.info(`Prepended entry for PR #${number}`);

      - name: Commit and push
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog change to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          git commit -m "chore(changelog): entry for #${{ github.event.pull_request.number }} [skip ci]"
          git push
