# Dependabot version updates.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Conventional-commits convention used here:
#   ci:           changes to CI configuration (GitHub Actions, workflows)
#   build:        changes that affect the build system or external deps (SPM)
#   chore(deps):  routine dependency bump
#
# Breaking changes (major-version bumps) should carry a '!' after the type,
# e.g. 'feat!: ...' or 'build(deps)!: ...'. Dependabot itself doesn't add
# the '!' for major bumps - either set commit-message.prefix manually here
# for a given ecosystem if every bump in that ecosystem is breaking, or
# rename the commit on the PR via a follow-up commit before merge. The
# auto-merge workflow treats every Dependabot PR as author-trusted; the
# convention is for downstream consumers reading the squash-merge log.

version: 2
updates:
  # GitHub Actions used by .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope

  # Swift Package Manager (no third-party deps right now, but enables future
  # tracking automatically once Package.swift gains dependencies)
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift
    commit-message:
      prefix: build
      include: scope
